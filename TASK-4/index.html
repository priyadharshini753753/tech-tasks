<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Interactive Button</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
      }

      button {
        padding: 12px 25px;
        font-size: 16px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <h1>Interactive Button Task</h1>
    <p>Click the button to change the background color</p>

    <button onclick="changeColor()">Change Background</button>

    <script src="script.js"></script>
  </body>
</html>
