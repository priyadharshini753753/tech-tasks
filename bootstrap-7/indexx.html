<!doctype html>
<html>
  <head>
    <title>Bootstrap Components</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      #popup {
        display: none;
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
        text-align: center;
      }
    </style>

    <script>
      function showPopup() {
        document.getElementById("popup").style.display = "block";
      }

      function accept() {
        alert("ohh! how sweet ur..");
        document.getElementById("popup").style.display = "none";
      }
    </script>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="#">Welcome</a>
      </div>
    </nav>

    <div class="container mt-5 text-center">
      <div class="card p-4 shadow">
        <h1>hyy buddy</h1>
        <p><h2>think before click me bcz u dont hve options</h2></p>

        <button class="btn btn-success" onclick="showPopup()">Click Me</button>
      </div>
    </div>

    <div id="popup">
      <p><h2>Will u be mine!</h2></p>
      <button class="btn btn-primary" onclick="accept()">Yes</button>
    </div>
  </body>
</html>
